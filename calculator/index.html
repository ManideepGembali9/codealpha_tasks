<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="topbar">
      <span>Calculator</span>
      <span id="mode">Keyboard Ready</span>
    </div>

    <div class="display">
      <div class="expression" id="expression">0</div>
      <div class="result" id="result"></div>
    </div>

    <div class="history-panel">
      <div class="history-head">
        <span>History</span>
        <button class="history-clear" id="clearHistoryBtn">Clear History</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>

    <div class="keys">
      <button class="danger" data-action="clear">AC</button>
      <button class="op" data-action="delete">DEL</button>
      <button class="op" data-value="(">(</button>
      <button class="op" data-value=")">)</button>
      <button class="op" data-value="/">÷</button>

      <button class="small" data-fn="sqrt">√x</button>
      <button class="small" data-fn="cbrt">∛x</button>
      <button class="small" data-fn="square">x²</button>
      <button class="small" data-fn="cube">x³</button>
      <button class="op" data-value="*">×</button>

      <button class="small" data-fn="sin">sin</button>
      <button class="small" data-fn="cos">cos</button>
      <button class="small" data-fn="tan">tan</button>
      <button class="small" data-fn="log">log</button>
      <button class="op" data-value="-">−</button>

      <button class="small" data-fn="ln">ln</button>
      <button class="small" data-fn="pi">π</button>
      <button class="small" data-fn="e">e</button>
      <button class="small" data-fn="fact">x!</button>
      <button class="op" data-value="+">+</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="small" data-fn="inv">1/x</button>
      <button class="accent" data-action="equals">=</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="small" data-value="^">^</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value=".">.</button>

      <button data-value="0">0</button>
      <button data-action="percent">%</button>
    </div>

    <div class="footer">Use buttons or keyboard: Enter =, Backspace delete, Esc clear</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
